app = "securethecloud-mcp-governance-lab"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NEXT_PUBLIC_API_BASE_URL = "https://securethecloud-mcp-governance-lab-api.fly.dev"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
