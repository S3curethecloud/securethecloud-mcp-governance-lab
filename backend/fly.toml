app = "securethecloud-mcp-governance-lab-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  LAB_MODE = "true"
  PORT = "8000"
  CORS_ORIGINS = "https://securethecloud-mcp-governance-lab.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
